<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>ClearList</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div class="bg-grid"></div>

  <main>

    <header>
      <div class="logo">
        <span class="logo-mark">✓</span>
        <h1>ClearList</h1>
      </div>
      <p class="tagline">Get it done. Clear it out.</p>
    </header>

    <section class="card form-card">
      <form id="add-list" action="">
        <input id="task-input" type="text" placeholder="Add a new task..." autocomplete="off">
        <button type="submit">
          <span class="material-symbols-outlined">add</span>
          Add
        </button>
      </form>
    </section>

    <section class="stats-row">
      <div class="stat">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number done" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number pending" id="stat-pending">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </section>

    <section class="card tasks-card">
      <div id="tasks-container"></div>
    </section>

  </main>

  <script src="scripts/script.js"></script>
</body>
</html>
